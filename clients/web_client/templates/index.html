<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App Web Client</title>
    <style>
      body {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        margin: 2rem;
        background: linear-gradient(120deg, #f7fafc, #e6fffa);
      }

      h1 {
        margin-bottom: 0.5rem;
      }

      .panel {
        max-width: 720px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 1rem;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      input,
      textarea,
      button {
        width: 100%;
        padding: 0.6rem;
        box-sizing: border-box;
        border: 1px solid #94a3b8;
        border-radius: 8px;
        font-size: 0.95rem;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      button {
        cursor: pointer;
        background: #0f766e;
        color: white;
        border: 0;
      }

      pre {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        min-height: 140px;
        overflow: auto;
      }

      .status {
        margin-bottom: 0.75rem;
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <h1>Chat App - Web Client</h1>
    <p>Step 1 boilerplate client using Flask + WebSockets.</p>

    <div class="panel">
      <div class="status" id="status">Disconnected</div>

      <div class="row">
        <input id="client_id" placeholder="client_id" value="user_a" />
        <input id="to" placeholder="message_to" value="user_b" />
      </div>

      <div class="row" style="grid-template-columns: 1fr 180px">
        <input id="ws_base" placeholder="WebSocket endpoint" value="ws://127.0.0.1:8080/ws" />
        <button id="connect">Connect</button>
      </div>

      <div class="row" style="grid-template-columns: 1fr">
        <textarea id="content" placeholder="Write your message"></textarea>
      </div>

      <button id="send">Send Message</button>

      <pre id="messages"></pre>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const messagesEl = document.getElementById("messages");
      const sendBtn = document.getElementById("send");
      const connectBtn = document.getElementById("connect");
      let socket = null;

      function appendMessage(line) {
        messagesEl.textContent += `${line}\n`;
      }

      function connect() {
        const clientId = document.getElementById("client_id").value.trim();
        const base = document.getElementById("ws_base").value.trim();
        if (!clientId || !base) {
          statusEl.textContent = "client_id and endpoint are required";
          return;
        }

        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.close();
        }

        statusEl.textContent = "Connecting...";
        const connector = base.includes("?") ? "&" : "?";
        socket = new WebSocket(`${base}${connector}client_id=${encodeURIComponent(clientId)}`);

        socket.onopen = () => {
          statusEl.textContent = `Connected as ${clientId}`;
          appendMessage(`connected:${clientId}`);
        };

        socket.onclose = () => {
          statusEl.textContent = "Disconnected";
          appendMessage("disconnected");
        };

        socket.onmessage = (event) => {
          appendMessage(event.data);
        };

        socket.onerror = () => {
          statusEl.textContent = "Socket error";
        };
      }

      connectBtn.addEventListener("click", connect);

      sendBtn.addEventListener("click", () => {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          statusEl.textContent = "Connect first";
          return;
        }

        const clientId = document.getElementById("client_id").value.trim();
        const payload = {
          message_from: clientId,
          message_to: document.getElementById("to").value,
          content: document.getElementById("content").value,
        };

        socket.send(JSON.stringify(payload));
      });
    </script>
  </body>
</html>
