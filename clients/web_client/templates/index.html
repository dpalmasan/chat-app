<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
      :root {
        --bg-top: #fff8ef;
        --bg-bottom: #d8f0ff;
        --panel: #ffffff;
        --ink: #1f2937;
        --muted: #64748b;
        --accent: #0f766e;
        --accent-dark: #0d5f58;
        --line: #dbe6ef;
        --bubble-out: #ddf6f0;
        --bubble-in: #f1f5f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 0% 0%, var(--bg-top), var(--bg-bottom));
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.2rem;
      }

      .hidden {
        display: none !important;
      }

      .status {
        color: var(--accent);
        font-size: 0.92rem;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1rem;
      }

      input,
      textarea,
      button {
        width: 100%;
        padding: 0.62rem;
        border: 1px solid #9fb2c4;
        border-radius: 8px;
        font-size: 0.95rem;
        font-family: inherit;
      }

      button {
        cursor: pointer;
        border: 0;
        color: #ffffff;
        background: var(--accent);
      }

      button:hover {
        background: var(--accent-dark);
      }

      .login-screen {
        min-height: 86vh;
        display: grid;
        place-items: center;
      }

      .login-card {
        width: min(520px, 96vw);
        padding: 1.2rem;
      }

      .login-card h1 {
        margin: 0;
      }

      .hint {
        margin: 0.35rem 0 1rem;
        color: var(--muted);
      }

      .login-form {
        display: grid;
        gap: 0.65rem;
      }

      .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 0.9rem;
      }

      .chat-header h2 {
        margin: 0;
      }

      .server-label {
        margin-top: 0.2rem;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .chat-shell {
        display: grid;
        grid-template-columns: 290px 1fr;
        gap: 1rem;
        min-height: 76vh;
      }

      .users-panel {
        overflow: auto;
      }

      .section-title {
        margin: 0 0 0.55rem;
        font-size: 0.9rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .user-list {
        margin: 0 0 1rem;
        padding: 0;
        list-style: none;
      }

      .user-item button {
        text-align: left;
        border: 1px solid transparent;
        background: transparent;
        color: var(--ink);
      }

      .user-item button:hover,
      .user-item button.active {
        border-color: #bde5dd;
        background: #f3fffc;
      }

      .status-line {
        display: block;
        margin-top: 0.2rem;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .chat-panel {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 0.8rem;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.6rem;
      }

      #thread {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.7rem;
        min-height: 200px;
        max-height: 52vh;
        overflow: auto;
        background: linear-gradient(180deg, #fafcff, #f7f8fa);
      }

      .message {
        max-width: 72%;
        border-radius: 999px;
        padding: 0.5rem 0.85rem;
        margin: 0.35rem 0;
      }

      .message.incoming {
        background: var(--bubble-in);
      }

      .message.outgoing {
        margin-left: auto;
        background: var(--bubble-out);
      }

      .message .meta {
        display: block;
        text-align: right;
        margin-top: 0.16rem;
        color: var(--muted);
        font-size: 0.72rem;
      }

      .message .text {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .composer-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.5rem;
        align-items: end;
      }

      #content {
        min-height: 48px;
        max-height: 140px;
        resize: vertical;
      }

      .send-small {
        width: 72px;
        height: 42px;
        padding: 0;
        border-radius: 10px;
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .empty {
        color: var(--muted);
        font-style: italic;
      }

      @media (max-width: 900px) {
        .chat-shell {
          grid-template-columns: 1fr;
        }

        .users-panel {
          max-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section id="login_screen" class="login-screen">
        <div class="panel login-card">
          <h1>Welcome Back</h1>
          <p class="hint">Login with an existing user and choose your endpoints.</p>
          <form id="login_form" class="login-form">
            <input id="login_user_id" placeholder="User ID (user_a..user_e)" value="user_a" />
            <input id="chat_service_base" placeholder="Load Balancer URL" value="" />
            <button id="login_btn" type="submit">Log In</button>
            <div class="status" id="login_status"></div>
          </form>
        </div>
      </section>

      <section id="chat_screen" class="hidden">
        <div class="chat-header">
          <div>
            <h2 id="welcome_title">Chat App</h2>
            <div class="status" id="status">Disconnected</div>
            <div class="server-label" id="server_label">Server: n/a</div>
          </div>
          <button id="logout_btn" class="send-small">Logout</button>
        </div>

        <div class="chat-shell">
          <aside class="panel users-panel">
            <p class="section-title">Online Users</p>
            <ul class="user-list" id="online_users"></ul>

            <p class="section-title">Offline Users</p>
            <ul class="user-list" id="offline_users"></ul>
          </aside>

          <section class="panel chat-panel">
            <div class="top-bar">
              <strong id="chat_title">No chat selected</strong>
              <small id="chat_subtitle" class="status"></small>
            </div>

            <div id="thread"></div>

            <div class="composer-row">
              <textarea
                id="content"
                placeholder="Type a message and press Enter to send. Use Shift+Enter for newline."
              ></textarea>
              <button id="send" class="send-small" type="button">Send</button>
            </div>
          </section>
        </div>
      </section>
    </div>

    <template id="message_tpl">
      <div class="message">
        <div class="text"></div>
        <span class="meta"></span>
      </div>
    </template>

    <script>
      const loginScreenEl = document.getElementById("login_screen");
      const chatScreenEl = document.getElementById("chat_screen");
      const loginFormEl = document.getElementById("login_form");
      const loginStatusEl = document.getElementById("login_status");
      const logoutBtn = document.getElementById("logout_btn");
      const statusEl = document.getElementById("status");
      const sendBtn = document.getElementById("send");
      const threadEl = document.getElementById("thread");
      const onlineUsersEl = document.getElementById("online_users");
      const offlineUsersEl = document.getElementById("offline_users");
      const chatTitleEl = document.getElementById("chat_title");
      const chatSubtitleEl = document.getElementById("chat_subtitle");
      const welcomeTitleEl = document.getElementById("welcome_title");
      const serverLabelEl = document.getElementById("server_label");
      const msgTpl = document.getElementById("message_tpl");
      const contentEl = document.getElementById("content");
      const chatServiceBaseEl = document.getElementById("chat_service_base");

      let socket = null;
      let currentUser = "";
      let selectedUser = "";
      let apiBase = window.location.origin;
      let assignedWsEndpoint = "";
      let usersPollTimer = null;
      let reconnectTimer = null;
      let shouldReconnect = false;
      let socketGeneration = 0;
      const conversations = new Map();

      function partnerFor(msg) {
        return msg.message_from === currentUser ? msg.message_to : msg.message_from;
      }

      function formatTime(isoText) {
        if (!isoText) {
          return "";
        }
        const date = new Date(isoText);
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function normalizeMessageText(rawText) {
        if (typeof rawText !== "string") {
          return "";
        }
        return rawText
          .replace(/\\r\\n/g, "\n")
          .replace(/\\n/g, "\n")
          .replace(/\\r/g, "\r")
          .replace(/\\t/g, "\t");
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setLoginStatus(text) {
        loginStatusEl.textContent = text;
      }

      function normalizeBase(url) {
        return (url || "").trim().replace(/\/$/, "");
      }

      function initializeApiBaseInput() {
        if (!chatServiceBaseEl) {
          return;
        }
        const current = normalizeBase(chatServiceBaseEl.value);
        if (!current || current === "http://127.0.0.1:5000") {
          chatServiceBaseEl.value = window.location.origin;
        }
      }

      async function apiRequest(path, options) {
        const normalizedPath = path.startsWith("/") ? path : `/${path}`;

        async function call(base) {
          const response = await fetch(`${base}${normalizedPath}`, options);
          return await response.json();
        }

        try {
          return await call(apiBase);
        } catch (error) {
          // If the configured API base is unreachable, fall back to the current web-client origin.
          if (apiBase !== window.location.origin) {
            return await call(window.location.origin);
          }
          throw error;
        }
      }

      async function dbLogin(userId) {
        return await apiRequest("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: userId }),
        });
      }

      async function fetchUsers() {
        return await apiRequest("/api/users");
      }

      async function fetchHistory(userId) {
        return await apiRequest(`/api/history?user_id=${encodeURIComponent(userId)}`);
      }

      async function logoutAssignment(userId) {
        return await apiRequest("/api/logout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: userId }),
        });
      }

      function clearList(el) {
        while (el.firstChild) {
          el.removeChild(el.firstChild);
        }
      }

      function renderUsers(users) {
        clearList(onlineUsersEl);
        clearList(offlineUsersEl);

        const online = users.filter((u) => u.user_id !== currentUser && u.is_online);
        const offline = users.filter((u) => u.user_id !== currentUser && !u.is_online);

        function mountUser(user, targetEl) {
          const li = document.createElement("li");
          li.className = "user-item";

          const btn = document.createElement("button");
          if (user.user_id === selectedUser) {
            btn.classList.add("active");
          }
          btn.innerHTML =
            `<strong>${user.user_id}</strong><span class="status-line">last active ${formatTime(user.last_active_at)}</span>`;
          btn.addEventListener("click", () => {
            selectedUser = user.user_id;
            chatTitleEl.textContent = `Chat with ${selectedUser}`;
            chatSubtitleEl.textContent = user.is_online ? "Online" : "Offline";
            renderThread();
            renderUsers(users);
          });

          li.appendChild(btn);
          targetEl.appendChild(li);
        }

        for (const user of online) {
          mountUser(user, onlineUsersEl);
        }
        for (const user of offline) {
          mountUser(user, offlineUsersEl);
        }
      }

      function renderThread() {
        while (threadEl.firstChild) {
          threadEl.removeChild(threadEl.firstChild);
        }

        if (!selectedUser) {
          return;
        }

        const messages = conversations.get(selectedUser) || [];
        if (messages.length === 0) {
          const p = document.createElement("p");
          p.className = "empty";
          p.textContent = "No messages yet.";
          threadEl.appendChild(p);
          return;
        }

        for (const msg of messages) {
          const node = msgTpl.content.firstElementChild.cloneNode(true);
          node.classList.add(msg.message_from === currentUser ? "outgoing" : "incoming");
          node.querySelector(".text").textContent = normalizeMessageText(msg.content);
          node.querySelector(".meta").textContent = formatTime(msg.created_at);
          threadEl.appendChild(node);
        }

        threadEl.scrollTop = threadEl.scrollHeight;
      }

      function addMessage(msg) {
        const partner = partnerFor(msg);
        if (!conversations.has(partner)) {
          conversations.set(partner, []);
        }
        conversations.get(partner).push(msg);
        if (partner === selectedUser) {
          renderThread();
        }
      }

      function hydrateHistory(messages) {
        conversations.clear();
        for (const message of messages) {
          const partner = message.message_from === currentUser ? message.message_to : message.message_from;
          if (!conversations.has(partner)) {
            conversations.set(partner, []);
          }
          conversations.get(partner).push(message);
        }
      }

      async function refreshUsers() {
        let result;
        try {
          result = await fetchUsers();
        } catch (_) {
          setStatus("Failed to refresh users");
          return;
        }
        if (!result.ok) {
          setStatus(result.error || "Failed to load users");
          return;
        }
        renderUsers(result.users || []);
      }

      function connectWebSocket() {
        const wsBase = assignedWsEndpoint;
        if (!wsBase || !currentUser) {
          return;
        }

        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }

        if (socket && socket.readyState === WebSocket.OPEN) {
          return;
        }
        if (socket && socket.readyState === WebSocket.CONNECTING) {
          return;
        }

        setStatus("Connecting websocket...");
        const connector = wsBase.includes("?") ? "&" : "?";
        socketGeneration += 1;
        const generation = socketGeneration;
        socket = new WebSocket(`${wsBase}${connector}client_id=${encodeURIComponent(currentUser)}`);
        const currentSocket = socket;

        currentSocket.onopen = () => {
          if (socket !== currentSocket || generation !== socketGeneration) {
            return;
          }
          setStatus(`Connected as ${currentUser}`);
          refreshUsers().catch(() => {});
        };

        currentSocket.onclose = () => {
          if (socket !== currentSocket || generation !== socketGeneration) {
            return;
          }
          setStatus("Disconnected");
          if (shouldReconnect && currentUser && assignedWsEndpoint) {
            setStatus("Disconnected. Reconnecting...");
            reconnectTimer = setTimeout(() => {
              connectWebSocket();
            }, 1000);
          }
        };

        currentSocket.onerror = () => {
          if (socket !== currentSocket || generation !== socketGeneration) {
            return;
          }
          setStatus("Socket error");
        };

        currentSocket.onmessage = (event) => {
          if (socket !== currentSocket || generation !== socketGeneration) {
            return;
          }
          try {
            const payload = JSON.parse(event.data);
            if (payload.type === "error") {
              setStatus(payload.message);
              return;
            }
            if (payload.type === "chat_message") {
              addMessage(payload);
              refreshUsers().catch(() => {});
            }
          } catch (_) {
            setStatus("Received non-JSON event");
          }
        };
      }

      function sendCurrentMessage() {
        if (!socket) {
          if (currentUser && assignedWsEndpoint) {
            setStatus("No websocket session. Reconnecting...");
            connectWebSocket();
            return;
          }
          setStatus("Connect first");
          return;
        }
        if (socket.readyState === WebSocket.CONNECTING) {
          setStatus("Still connecting websocket...");
          return;
        }
        if (socket.readyState !== WebSocket.OPEN) {
          setStatus("Disconnected. Reconnecting...");
          connectWebSocket();
          return;
        }
        if (!selectedUser) {
          setStatus("Select a chat user first");
          return;
        }

        const content = contentEl.value.trim();
        if (!content) {
          return;
        }

        socket.send(
          JSON.stringify({
            message_from: currentUser,
            message_to: selectedUser,
            content,
          })
        );
        contentEl.value = "";
        refreshUsers().catch(() => {});
      }

      function showChatScreen() {
        loginScreenEl.classList.add("hidden");
        chatScreenEl.classList.remove("hidden");
      }

      function showLoginScreen() {
        chatScreenEl.classList.add("hidden");
        loginScreenEl.classList.remove("hidden");
      }

      function startUsersPolling() {
        if (usersPollTimer) {
          clearInterval(usersPollTimer);
        }
        usersPollTimer = setInterval(() => {
          refreshUsers().catch(() => {});
        }, 2000);
      }

      function stopUsersPolling() {
        if (usersPollTimer) {
          clearInterval(usersPollTimer);
          usersPollTimer = null;
        }
      }

      loginFormEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const userId = document.getElementById("login_user_id").value.trim();
        apiBase = normalizeBase(chatServiceBaseEl.value) || window.location.origin;

        if (!userId) {
          setLoginStatus("user_id is required");
          return;
        }

        setLoginStatus("Logging in...");
        try {
          const result = await dbLogin(userId);
          if (!result.ok) {
            setLoginStatus(result.error || "Login failed");
            return;
          }
          if (!result.service_discovery || !result.service_discovery.websocket_endpoint) {
            setLoginStatus("No websocket endpoint assigned by load balancer");
            return;
          }

          currentUser = result.user.user_id;
          assignedWsEndpoint = result.service_discovery.websocket_endpoint;
          shouldReconnect = true;
          welcomeTitleEl.textContent = `Chat App - ${currentUser}`;
          serverLabelEl.textContent = `Server: ${assignedWsEndpoint}`;
          setLoginStatus("");
          showChatScreen();

          const historyResult = await fetchHistory(currentUser);
          if (historyResult.ok) {
            hydrateHistory(historyResult.messages || []);
          } else {
            setStatus(historyResult.error || "Failed to load history");
          }

          await refreshUsers();
          renderThread();
          connectWebSocket();
          setStatus(`Connected via ${assignedWsEndpoint}`);
          startUsersPolling();
        } catch (_) {
          setLoginStatus("Cannot reach chat service URL");
        }
      });

      sendBtn.addEventListener("click", sendCurrentMessage);

      contentEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendCurrentMessage();
        }
      });

      logoutBtn.addEventListener("click", async () => {
        shouldReconnect = false;
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        stopUsersPolling();
        if (socket) {
          socket.close();
          socket = null;
          socketGeneration += 1;
        }

        if (currentUser) {
          try {
            await logoutAssignment(currentUser);
          } catch (_) {
          }
        }

        currentUser = "";
        selectedUser = "";
        assignedWsEndpoint = "";
        serverLabelEl.textContent = "Server: n/a";
        conversations.clear();
        setStatus("Disconnected");
        showLoginScreen();
      });

      initializeApiBaseInput();
      showLoginScreen();
    </script>
  </body>
</html>
